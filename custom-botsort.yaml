tracker_type:       botsort         # tracker backend: botsort | bytetrack

track_high_thresh:  0.30            # 1st-stage match threshold
track_low_thresh:   0.10            # 2nd-stage threshold for low-score matches
new_track_thresh:   0.30            # min score to start a new track — aligned with CONF_THRESHOLD
track_buffer:       300             # frames to keep a lost track alive (10 s at 30 fps)
match_thresh:       0.75            # IoU/cost threshold — lower = more generous re-matching
fuse_score:         True            # fuse detection score with IoU for more stable matching

# BoT-SORT — camera motion compensation
gmc_method:         none            # "none" for fixed cameras; "sparseOptFlow" if camera moves/shakes

# ReID (appearance-based re-identification)
# Allows re-matching the same person after full occlusion by looking at their appearance.
proximity_thresh:   0.30            # lower = allows re-ID even with little spatial overlap
appearance_thresh:  0.60            # lower = more lenient appearance match (better for occlusion)
with_reid:          True            # appearance ReID ON — downloads small model on first run
model:              auto            # ReID model; "auto" uses detector features