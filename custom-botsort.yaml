tracker_type:       botsort

track_high_thresh:  0.35   # 1st-stage match (should be ≥ CONF_THRESHOLD)
track_low_thresh:   0.10   # 2nd-stage match for low-confidence detections
new_track_thresh:   0.40   # min score to create a new track
track_buffer:       90     # frames to keep a lost track alive (~3 s at 30 fps)
match_thresh:       0.70   # IoU threshold for matching detections to tracks
fuse_score:         True

# Camera motion compensation — use "none" for fixed cameras
gmc_method:         none

# Appearance ReID — disabled by default (set with_reid: True to enable)
proximity_thresh:   0.45
appearance_thresh:  0.75
with_reid:          False
model:              auto